name: lifeherba
description: "LifeHerba - Holistic Wellness Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  provider: ^6.1.2

  # Routing
  go_router: ^13.2.0

  # Network & API
  dio: ^5.4.0
  http: ^1.2.0

  # Utilities & Helpers
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Icons & UI Elements
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - lib/assets/

